syntax = "proto3";

option csharp_namespace = "SharedKernel.Contracts.Grpc.File.v1";

package sharedKernel.contracts.v1;

service FileValidationService {
	rpc Exists(FileExistsRequest) returns (FileExistsResponse);
}

message FileExistsRequest {
	string file_id = 1;
}

message FileExistsResponse {
	bool exists = 1;
}