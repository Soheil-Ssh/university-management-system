syntax = "proto3";

option csharp_namespace = "SharedKernel.Contracts.Grpc.Identity.v1";

package sharedKernel.contracts.v1;

service IdentityUserService {
	rpc CreateCentralOrganizationEmployeeUser(CreateCentralOrganizationEmployeeUserRequest) returns (CreateCentralOrganizationEmployeeUserResponse);
}

message CreateCentralOrganizationEmployeeUserRequest {
	string username = 1;
	string email = 2;
	string password = 3;
}

message CreateCentralOrganizationEmployeeUserResponse {
	bool is_success = 1;
	string user_id = 2;
	string error_code = 3;
	string error_message = 4;
}