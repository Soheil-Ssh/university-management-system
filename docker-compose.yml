services:
 # Sql Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

  # Postgres
  postgres:
    image: postgres:alpine

  # Identity Api
  identity.api:
    image: ${DOCKER_REGISTRY-}identity.api
    build:
      context: .
      dockerfile: src/Services/Identity/Identity.Api/Dockerfile

  # File Api
  file.api:
    image: ${DOCKER_REGISTRY-}fileapi
    build:
      context: .
      dockerfile: src/Services/File/File.Api/Dockerfile

  # Student Api
  student.api:
    image: ${DOCKER_REGISTRY-}studentapi
    build:
      context: .
      dockerfile: src/Services/Student/Student.Api/Dockerfile

networks:
  ums_network:
    driver: bridge

volumes:
  sqlserver_data:
  postgres_data:
