services:
 # Sql Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

  # Postgres
  postgres:
    image: postgres:alpine
    
  # Loki
  loki:
    image: grafana/loki:latest

  # Prometheus
  prometheus:
    image: prom/prometheus:latest

  # Tempo
  tempo:
    image: grafana/tempo:latest

  # Grafana
  grafana:
    image: grafana/grafana:latest

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:4.3.2-management

  # Identity Api
  identity.api:
    image: ${DOCKER_REGISTRY-}identity.api
    build:
      context: .
      dockerfile: src/Services/Identity/Identity.Api/Dockerfile

  # File Api
  file.api:
    image: ${DOCKER_REGISTRY-}file.api
    build:
      context: .
      dockerfile: src/Services/File/File.Api/Dockerfile

  # Student Api
  student.api:
    image: ${DOCKER_REGISTRY-}student.api
    build:
      context: .
      dockerfile: src/Services/Student/Student.Api/Dockerfile

  # Central Organization Api
  central.organization.api:
    image: ${DOCKER_REGISTRY-}central.organization.api
    build:
      context: .
      dockerfile: src/Services/CentralOrganization/CentralOrganization.Api/Dockerfile

  # Notification Api
  notification.api:
    image: ${DOCKER_REGISTRY-}notification.api
    build:
      context: .
      dockerfile: src/Services/Notification/Notification.Api/Dockerfile

  # Faculty Api
  faculty.api:
    image: ${DOCKER_REGISTRY-}faculty.api
    build:
      context: .
      dockerfile: src/Services/Faculty/Faculty.Api/Dockerfile

  # Monitoring Health Checks
  monitoring.healthchecks:
    image: ${DOCKER_REGISTRY-}monitoringhealthchecks
    build:
      context: .
      dockerfile: src/Monitoring/Monitoring.HealthChecks/Dockerfile

networks:
  ums_network:
    driver: bridge

volumes:
  sqlserver_data:
  postgres_data:
  loki_data:
  prometheus_data:
  tempo_data:
  grafana_data: