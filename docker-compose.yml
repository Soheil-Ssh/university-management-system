services:
 # Sql Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

  # Postgres
  postgres:
    image: postgres:alpine
    
  # Loki
  loki:
    image: grafana/loki:latest

  # Grafana
  grafana:
    image: grafana/grafana:latest

  # Identity Api
  identity.api:
    image: ${DOCKER_REGISTRY-}identity.api
    build:
      context: .
      dockerfile: src/Services/Identity/Identity.Api/Dockerfile

  # File Api
  file.api:
    image: ${DOCKER_REGISTRY-}file.api
    build:
      context: .
      dockerfile: src/Services/File/File.Api/Dockerfile

  # Student Api
  student.api:
    image: ${DOCKER_REGISTRY-}student.api
    build:
      context: .
      dockerfile: src/Services/Student/Student.Api/Dockerfile

  # Central Organization Api
  central.organization.api:
    image: ${DOCKER_REGISTRY-}central.organization.api
    build:
      context: .
      dockerfile: src/Services/CentralOrganization/CentralOrganization.Api/Dockerfile

networks:
  ums_network:
    driver: bridge

volumes:
  sqlserver_data:
  postgres_data: