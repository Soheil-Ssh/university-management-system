global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  metric_name_validation_scheme: legacy
  metric_name_escaping_scheme: underscores

scrape_configs:
  - job_name: identity.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - identity.api:8080

  - job_name: file.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - file.api:8080

  - job_name: student.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - student.api:8080

  - job_name: central.organization.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - central.organization.api:8080

  - job_name: notification.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification.api:8080

  - job_name: faculty.api
    metrics_path: /metrics
    static_configs:
      - targets:
          - faculty.api:8080

  - job_name: monitoring.healthchecks
    metrics_path: /metrics
    static_configs:
      - targets:
          - monitoring.healthchecks:8080