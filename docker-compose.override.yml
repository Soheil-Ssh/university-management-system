services:
  # Sql server
  sqlserver:
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ums_network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -U sa -P Password123 -Q 'SELECT 1' -C || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  # Postgres
  postgres:
    image: postgres:alpine
    restart: always
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: 
     - "5432:5432"
    networks:
      - ums_network
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 10s
        timeout: 5s
        retries: 10

  # Loki
  loki:
    container_name: ums.loki
    ports:
      - "3100:3100"
    networks:
      - ums_network
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  # Grafana
  grafana:
    container_name: ums.grafana
    ports:
      - "3000:3000"
    networks:
      - ums_network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
    volumes:
      - grafana_data:/var/lib/grafana

  # RabbitMQ
  rabbitmq:
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    networks:
      - ums_network
    ports:
      - "5672:5672"
      - "15672:15672"

  # Identity Api
  identity.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__SqlServerDefaultConnection=Server=sqlserver;Database=Identity_Db;User=sa;Password=Password123;TrustServerCertificate=True;
      - Jwt__Authority=https://localhost:5051
      - Jwt__ValidIssuer=https://localhost:5051
      - Jwt__MetadataAddress=https://identity.api:8081/.well-known/openid-configuration
      - Jwt__RequireHttpsMetadata=false
      - Jwt__BackchannelIgnoreCertificateErrors=true
      - IdentityServer__Signing__PfxPath=/certs/identity-signing.pfx
      - IdentityServer__Signing__PfxPassword=change-this-password
      - Observability__Loki__Enabled=true
      - Observability__Loki__Uri=http://loki:3100
      - Observability__Loki__MinimumLevel=Information
    ports:
      - "5001:8080"
      - "5051:8081"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - ums_network
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
      - ./certs:/certs:ro

  # File Api
  file.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgresDefaultConnection=Host=postgres;Port=5432;Database=file_db;Username=file_user;Password=Password@123;TrustServerCertificate=True
      - Kestrel__Endpoints__Http__Url=http://0.0.0.0:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      - Kestrel__Endpoints__Https__Url=https://0.0.0.0:8081
      - Kestrel__Endpoints__Https__Protocols=Http1
      - Kestrel__Endpoints__Grpc__Url=http://0.0.0.0:8082
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - Observability__Loki__Enabled=true
      - Observability__Loki__Uri=http://loki:3100
      - Observability__Loki__MinimumLevel=Information
    ports:
      - "5002:8080"
      - "5052:8081"
      - "5082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums_network
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  # Student Api
  student.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgresDefaultConnection=Host=postgres;Port=5432;Database=student_db;Username=student_user;Password=Password@123;TrustServerCertificate=True
      - GrpcServices__FileServiceUrl=http://file.api:8082
      - Observability__Loki__Enabled=true
      - Observability__Loki__Uri=http://loki:3100
      - Observability__Loki__MinimumLevel=Information
    ports:
      - "5003:8080"
      - "5053:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums_network
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  # Central Organization Api
  central.organization.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__PostgresDefaultConnection=Host=postgres;Port=5432;Database=central_organization_db;Username=central_organization_user;Password=Password@123;TrustServerCertificate=True
      - Observability__Loki__Enabled=true
      - Observability__Loki__Uri=http://loki:3100
      - Observability__Loki__MinimumLevel=Information
    ports:
      - "5004:8080"
      - "5054:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums_network
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
